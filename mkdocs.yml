site_name: Rivet Documentation
theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.svg
  features:
    - content.tabs.link
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts:
    - Overview: concepts/index.md
    - Architecture: concepts/architecture.md
    - Joints: concepts/joints.md
    - Engines: concepts/engines.md
    - Catalogs: concepts/catalogs.md
    - Compilation: concepts/compilation.md
    - Materialization: concepts/materialization.md
    - Assertions, Audits & Tests: concepts/assertions-audits-tests.md
  - Guides:
    - Testing: guides/testing.md
    - Quality Checks: guides/quality-checks.md
    - Write Strategies: guides/write-strategies.md
    - Python Joints: guides/python-joints.md
    - REPL: guides/repl.md
  - Plugins:
    - Overview: plugins/index.md
    - DuckDB: plugins/duckdb.md
    - Polars: plugins/polars.md
    - PySpark: plugins/pyspark.md
    - Postgres: plugins/postgres.md
    - AWS (S3 + Glue): plugins/aws.md
    - Unity / Databricks: plugins/unity.md
    - Plugin Development: plugins/development.md
  - Reference:
    - API Reference: reference/api/index.md
    - Configuration: reference/config/index.md
    - CLI: reference/cli/index.md
    - Error Codes: reference/errors.md
