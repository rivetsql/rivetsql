name: Release

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release
    environment: release
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install python-semantic-release

      - name: Run semantic release
        id: semver
        run: cd rivet && semantic-release version --no-push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push version bump and tag
        if: steps.semver.outputs.released == 'true'
        run: git push --follow-tags

      - name: Create GitHub Release
        if: steps.semver.outputs.released == 'true'
        run: cd rivet && semantic-release publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
