name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  publish-core:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install hatch
      - run: cd rivet && hatch build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: rivet/dist/

  publish-plugins:
    needs: publish-core
    runs-on: ubuntu-latest
    environment: pypi
    strategy:
      matrix:
        plugin: [rivet_duckdb, rivet_postgres, rivet_polars, rivet_pyspark, rivet_databricks, rivet_aws]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install hatch
      - run: cd rivet/src/${{ matrix.plugin }} && hatch build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: rivet/src/${{ matrix.plugin }}/dist/

  publish-main:
    needs: publish-plugins
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install hatch
      - run: cp README.md rivet/README.md && cd rivet && cp pyproject.rivetsql.toml pyproject.toml && hatch build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: rivet/dist/
