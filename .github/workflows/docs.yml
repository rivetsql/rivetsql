name: Deploy Documentation

"on":
  push:
    branches: [main]

permissions:
  contents: write
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e "./rivet" mkdocs-material pymdown-extensions
      - run: mkdocs gh-deploy --force
